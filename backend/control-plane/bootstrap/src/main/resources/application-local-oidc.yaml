ops-agent:
  security:
    auth-mode: oidc
    issuer: http://127.0.0.1:8080/mock-oidc
    issuer-uri: http://127.0.0.1:8080/mock-oidc
    jwk-set-uri: http://127.0.0.1:8080/mock-oidc/oauth2/jwks
    audience: ops-agent-internal
    username-claim: preferred_username
    role-claim: roles
    role-prefix: ROLE_
    browser-login-enabled: true
    browser-registration-id: ops-agent
    browser-login-success-uri: /
    browser-logout-success-uri: "{baseUrl}/"
  local-oidc-provider:
    enabled: true
    issuer: http://127.0.0.1:8080/mock-oidc
    audience: ops-agent-internal
    client-id: ops-agent-local-client
    client-secret: ops-agent-local-secret
    default-subject: local-reader-id
    default-username: local.reader
    default-roles:
      - ops-reader
    authorization-code-ttl: 5m
    token-ttl: 10m

spring:
  security:
    oauth2:
      client:
        provider:
          ops-agent:
            authorization-uri: http://127.0.0.1:8080/mock-oidc/oauth2/authorize
            token-uri: http://127.0.0.1:8080/mock-oidc/oauth2/token
            jwk-set-uri: http://127.0.0.1:8080/mock-oidc/oauth2/jwks
            user-name-attribute: sub
        registration:
          ops-agent:
            provider: ops-agent
            client-id: ops-agent-local-client
            client-secret: ops-agent-local-secret
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
