ops-agent:
  security:
    auth-mode: oidc
    issuer: https://your-idp.example.com/realms/ops
    issuer-uri: https://your-idp.example.com/realms/ops
    jwk-set-uri:
    audience: ops-agent-internal
    username-claim: preferred_username
    role-claim: roles
    role-prefix: ROLE_
    browser-login-enabled: true
    browser-registration-id: ops-agent
    browser-login-success-uri: /auth/session
    browser-logout-success-uri: "{baseUrl}/"
  policy:
    version: rbac-v1
    required-roles-by-action:
      internal.health.read:
        - ROLE_ops-reader
        - ROLE_ops-admin
      internal.modules.read:
        - ROLE_ops-reader
        - ROLE_ops-admin
      internal.echo.read:
        - ROLE_ops-reader
        - ROLE_ops-admin
      internal.failures.read:
        - ROLE_ops-admin
      internal.audit.read:
        - ROLE_ops-admin
        - ROLE_ops-auditor
      internal.skills.read:
        - ROLE_ops-reader
        - ROLE_ops-admin
      internal.skills.publish.validate:
        - ROLE_ops-admin
      internal.routing.skills.read:
        - ROLE_ops-reader
        - ROLE_ops-admin
  skill-registry:
    root-path: backend/skills
    signature-required: true
    signing-secret: ops-agent-skill-signing-key-2026-06-06-0001
  audit:
    storage-mode: file
    storage-path: var/audit/control-plane-audit.jsonl

spring:
  security:
    oauth2:
      client:
        provider:
          ops-agent:
            issuer-uri: https://your-idp.example.com/realms/ops
        registration:
          ops-agent:
            provider: ops-agent
            client-id: your-client-id
            client-secret: your-client-secret
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
