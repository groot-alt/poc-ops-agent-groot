name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  repository-check:
    name: 仓库规范检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检查仓库基线
        shell: pwsh
        run: ./tools/ci/check-repository.ps1
      - name: 检查版本化契约
        shell: pwsh
        run: ./tools/ci/check-contracts.ps1

  maven-verify:
    name: Maven 构建与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven Verify
        working-directory: ./backend
        run: sh ./mvnw -f ./pom.xml -B -ntp verify
      - name: 收集构建制品
        if: always()
        shell: pwsh
        run: ./tools/ci/collect-artifacts.ps1
      - name: 上传构建制品
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-agent-ci-${{ github.sha }}
          path: artifacts/ci
          if-no-files-found: error
          retention-days: 14

  frontend-build:
    name: 操作台严格类型构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/operator-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/operator-console/package-lock.json
      - name: 安装前端依赖
        run: npm ci
      - name: 构建只读操作台
        run: npm run build

  secret-scan:
    name: 密钥扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 扫描高置信度密钥模式
        shell: pwsh
        run: ./tools/ci/scan-secrets.ps1
